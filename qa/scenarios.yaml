# QA Scenario Catalog
# Source of truth for what gets tested. Edit freely — Claude generates the initial list,
# you own it from here. Add scenarios as features are tested and confirmed working.
#
# Auth credentials: set TEST_EMAIL and TEST_PASSWORD env vars, or defaults are used.
# Defaults: admin@test.com / password

scenarios:

  # ── Authentication ─────────────────────────────────────────────────────────
  # Two-step auth: GoTrue (port 8000) → Identity Service (port 3100)
  # On success, puts {{token}} in context for all subsequent HTTP steps.
  - id: auth-login
    name: "Auth: get CRM JWT"
    service: identity
    steps:
      - type: http
        service: supabase-auth
        method: POST
        path: /auth/v1/token?grant_type=password
        body:
          email: "{{TEST_EMAIL}}"
          password: "{{TEST_PASSWORD}}"
        expect:
          status: 200
          body_contains: ["access_token"]
        extract:
          provider_token: "$.access_token"

      - type: http
        service: identity
        method: POST
        path: /identity/session
        body:
          provider_token: "{{provider_token}}"
        expect:
          status: 200
          body_contains: ["access_token"]
        extract:
          token: "$.access_token"

  # ── Locations ──────────────────────────────────────────────────────────────
  - id: location-create
    name: "Locations: create"
    service: identity
    depends_on: [auth-login]
    steps:
      - type: http
        method: POST
        path: /v1/locations
        body:
          name: "QA Test Location"
          address: "123 QA Street"
          city: "Austin"
          state: "TX"
          zip: "78701"
          phone: "+15551234567"
          timezone: "America/Chicago"
        expect:
          status: 201
          body_contains: ["id", "name"]
        extract:
          location_id: "$.id"

  - id: location-list
    name: "Locations: list"
    service: identity
    depends_on: [auth-login]
    steps:
      - type: http
        method: GET
        path: /v1/locations
        expect:
          status: 200
          body_contains: ["data"]

  - id: location-get
    name: "Locations: get by id"
    service: identity
    depends_on: [location-create]
    steps:
      - type: http
        method: GET
        path: /v1/locations/{{location_id}}
        expect:
          status: 200
          body_contains: ["id", "name"]

  # ── Leads ──────────────────────────────────────────────────────────────────
  - id: lead-create
    name: "Leads: create"
    service: crm-api-gateway
    depends_on: [auth-login, location-create]
    steps:
      - type: http
        method: POST
        path: /v1/leads
        body:
          first_name: "QA"
          last_name: "Test"
          phone: "+15559876543"
          email: "qa.test@example.com"
          source: "website"
          location_id: "{{location_id}}"
        expect:
          status: 201
          body_contains: ["id", "first_name"]
        extract:
          lead_id: "$.id"

  - id: lead-get
    name: "Leads: get by id"
    service: crm-api-gateway
    depends_on: [lead-create]
    steps:
      - type: http
        method: GET
        path: /v1/leads/{{lead_id}}
        expect:
          status: 200
          body_contains: ["id", "first_name", "last_name"]

  - id: lead-list
    name: "Leads: list with pagination"
    service: crm-api-gateway
    depends_on: [auth-login]
    steps:
      - type: http
        method: GET
        path: /v1/leads?page=1&limit=10
        expect:
          status: 200
          body_contains: ["data", "total"]

  - id: lead-update
    name: "Leads: update"
    service: crm-api-gateway
    depends_on: [lead-create]
    steps:
      - type: http
        method: PATCH
        path: /v1/leads/{{lead_id}}
        body:
          first_name: "UpdatedQA"
        expect:
          status: 200
          body_contains: ["id"]

  # ── Pipeline ───────────────────────────────────────────────────────────────
  - id: pipeline-lead-state
    name: "Pipeline: get lead's pipeline state"
    service: crm-api-gateway
    depends_on: [lead-create]
    steps:
      - type: http
        method: GET
        path: /v1/pipeline/leads/{{lead_id}}
        expect:
          status: 200
          body_contains: ["stage"]
