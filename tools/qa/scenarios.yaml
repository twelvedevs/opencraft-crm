# QA Scenario Catalog
# Source of truth for what gets tested. Edit freely.
#
# Auth credentials: set TEST_EMAIL and TEST_PASSWORD env vars, or defaults are used.
# Defaults: admin@test.com / password
#
# Dependency graph (top-level):
#   auth-login
#   ├── location-create → location-get, location-update, lead-create, ...
#   ├── location-list
#   ├── identity-me
#   ├── user-list
#   ├── lead-list, lead-duplicates-list
#   ├── conversation-list
#   ├── campaign-list, notification-list
#   ├── referrer-create → referral-link-create, referral-link-list, referrer-get, referrer-list
#   ├── reporting-dashboard, reporting-channel-performance, ...
#   ├── api-key-create → api-key-list, api-key-revoke
#   └── lead-create → lead-get, lead-update, lead-activities, ...
#       ├── appointment-create → appointment-list, appointment-update
#       └── pipeline-enroll → pipeline-membership-get, pipeline-transition → pipeline-history

scenarios:

  # ── Authentication ────────────────────────────────────────────────────────
  # Two-step auth: GoTrue (port 8000) → Identity Service (port 3100)
  # Puts {{token}} in context — used automatically as Bearer header in all HTTP steps.
  - id: auth-login
    name: "Auth: get CRM JWT"
    service: identity
    steps:
      - type: http
        service: supabase-auth
        method: POST
        path: /auth/v1/token?grant_type=password
        body:
          email: "{{TEST_EMAIL}}"
          password: "{{TEST_PASSWORD}}"
        expect:
          status: 200
          body_contains: ["access_token"]
        extract:
          provider_token: "$.access_token"

      - type: http
        service: identity
        method: POST
        path: /identity/session
        body:
          provider_token: "{{provider_token}}"
        expect:
          status: 200
          body_contains: ["access_token"]
        extract:
          token: "$.access_token"

  # ── Identity: current user ────────────────────────────────────────────────
  - id: identity-me
    name: "Identity: get current user profile"
    service: identity
    depends_on: [auth-login]
    steps:
      - type: http
        service: identity
        method: GET
        path: /identity/me
        expect:
          status: 200
          body_contains: ["id", "email"]
        extract:
          current_user_id: "$.id"

  # ── Identity: users ───────────────────────────────────────────────────────
  - id: user-list
    name: "Users: list"
    service: identity
    depends_on: [auth-login]
    steps:
      - type: http
        service: identity
        method: GET
        path: /identity/users
        expect:
          status: 200
          body_contains: ["data", "nextCursor"]

  - id: user-create
    name: "Users: create call center agent"
    service: identity
    depends_on: [auth-login, location-create]
    steps:
      - type: http
        service: identity
        method: POST
        path: /identity/users
        body:
          email: "qa.agent@orthocrm-test.invalid"
          role: "call_center_agent"
          location_ids: ["{{location_id}}"]
          first_name: "QA"
          last_name: "Agent"
        expect:
          status: 201
          body_contains: ["id", "email"]
        extract:
          created_user_id: "$.id"

  # ── Locations ─────────────────────────────────────────────────────────────
