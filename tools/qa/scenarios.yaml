          body_contains: ["data"]

  - id: pipeline-enroll
    name: "Pipeline: enroll lead in New Patient pipeline"
    service: crm-api-gateway
    depends_on: [lead-create]
    steps:
      - type: http
        method: POST
        path: /v1/pipeline/memberships
        body:
          lead_id: "{{lead_id}}"
          location_id: "{{location_id}}"
          pipeline: "new_patient"
          stage: "new_lead"
          reason: "manual"
        expect:
          status: 201
          body_contains: ["id", "stage"]
        extract:
          membership_id: "$.id"

  - id: pipeline-membership-get
    name: "Pipeline: get membership by id"
    service: crm-api-gateway
