  # ── Pipeline ──────────────────────────────────────────────────────────────
  # NOTE: the old pipeline-lead-state scenario used GET /v1/pipeline/leads/:id
  # which does not exist. Replaced with GET /v1/pipeline/memberships?lead_id=...
  - id: pipeline-lead-memberships
    name: "Pipeline: list memberships for lead"
    service: crm-api-gateway
    depends_on: [lead-create]
    steps:
      - type: http
        method: GET
        path: /v1/pipeline/memberships?lead_id={{lead_id}}
        expect:
