# Health checks — no auth required.
# Run first to verify all services are reachable before functional tests.

scenarios:

  - id: health-api-gateway
    name: "Health: CRM API Gateway"
    service: crm-api-gateway
    steps:
      - type: http
        method: GET
        path: /health
        expect:
          status: 200
          body_contains: ["status"]

  - id: health-identity
    name: "Health: Identity Service (ready)"
    service: identity
    steps:
      - type: http
        service: identity
        method: GET
        path: /ready
