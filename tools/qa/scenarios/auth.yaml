# Authentication — two-step: GoTrue (port 8000) → Identity Service (port 3100).
# Extracts {{token}} which is auto-injected as Bearer header in all subsequent HTTP steps.
# Credentials: set TEST_EMAIL / TEST_PASSWORD env vars (defaults: admin@test.com / password).

scenarios:

  - id: auth-login
    name: "Auth: get CRM JWT"
    service: identity
    steps:
      - type: http
        service: supabase-auth
        method: POST
        path: /auth/v1/token?grant_type=password
        body:
          email: "{{TEST_EMAIL}}"
          password: "{{TEST_PASSWORD}}"
        expect:
          status: 200
          body_contains: ["access_token"]
        extract:
          provider_token: "$.access_token"

      - type: http
        service: identity
        method: POST
        path: /identity/session
        body:
          provider_token: "{{provider_token}}"
        expect:
          status: 200
          body_contains: ["access_token"]
        extract:
          token: "$.access_token"
